run:
  factor_scope: cs
  eval_axis: cross_section
  standardization: cs_rank

data:
  mode: panel
  adapter: stooq
  symbols: [aapl, msft, googl, amzn]
  start_date: '2022-01-01'
  end_date: null
  request_timeout_sec: 20
  min_rows_per_asset: 30
  fields_required: [date, asset, close, volume]
  sanitize: true
  duplicate_policy: last

factor:
  names: [momentum_20, volatility_20]
  on_missing: raise
  auto_discover: false
  plugin_dirs: []
  plugins: []
  plugin_on_error: raise
  expressions: {}
  expression_on_error: raise
  combinations: []
  combination_on_error: raise

research:
  horizons: [1, 5, 10, 20]
  quantiles: 5
  ic_rolling_window: 20
  missing_policy: drop
  preprocess_steps: [winsorize, standardize]
  transform_auto_discover: false
  transform_plugin_dirs: []
  transform_plugins: []
  transform_plugin_on_error: raise
  custom_transforms: []
  winsorize:
    enabled: true
    method: quantile
    lower_q: 0.01
    upper_q: 0.99
    mad_scale: 5.0
  neutralize:
    enabled: false
    mode: none

backtest:
  enabled: false
  strategy:
    mode: longshort
    auto_discover: false
    plugin_dirs: []
    plugins: []
    plugin_on_error: raise
  commission_bps: 3.0
  slippage_bps: 2.0
  leverage: 1.0
  execution_delay_days: 1
  execution_price_col: close
