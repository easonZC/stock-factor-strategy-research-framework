# 截面因子研究配置（Stooq 公共数据）
# 目标：在不依赖私有数据的前提下，验证真实数据端到端流程。

imports:
  - base.yaml

run:
  factor_scope: cs
  eval_axis: cross_section
  standardization: cs_rank
  # 公共样本默认先以 dev 档位提升迭代速度
  research_profile: dev
  stop_after: research

data:
  adapter: stooq
  mode: panel

  # 股票列表可按需扩展；也可通过 --set 临时覆盖
  symbols: [aapl, msft, googl, amzn]
  start_date: "2022-01-01"
  end_date: null
  request_timeout_sec: 20
  min_rows_per_asset: 30
  fields_required: [date, asset, close, volume]

factor:
  names: [momentum_20, volatility_20]

research:
  preprocess_steps: [winsorize, standardize]
  neutralize:
    enabled: false
    mode: none

backtest:
  enabled: false
