# 截面因子研究主配置（建议长期使用这一个 CS 配置）
#
# 使用方式：
# 1) 把数据文件或数据目录放好（如 data/raw、data/panel.parquet、data/panel.csv）
# 2) 直接运行：
#    python apps/run_from_config.py --config configs/cs_factor.yaml --set data.path=data/raw --out outputs/research/factor/cs
# 3) 因子名可在这里写死，或运行时用 --set 覆盖

run:
  # 因子作用域：cs=截面
  factor_scope: cs
  # 评估轴：截面研究固定 cross_section
  eval_axis: cross_section
  # 标准化：cs_zscore / cs_rank / cs_robust_zscore / none
  standardization: cs_zscore
  # 档位：fast / dev / full
  research_profile: dev
  # 在哪个阶段停止：factor / research / backtest
  stop_after: backtest
  # 配置治理策略：strict / warn / compat
  config_mode: warn
  # 泄露防护：strict / warn / off
  leakage_guard_mode: strict

data:
  # 数据路径：可指向单文件或目录
  # - 文件：*.parquet / *.csv
  # - 目录：自动合并 *.parquet,*.csv
  path: data/raw
  # mode：panel(多资产) / single_asset(单资产)
  mode: panel
  sanitize: true
  duplicate_policy: last
  # 目录模式读取参数（path 指向目录时生效）
  raw_pattern: "*.parquet,*.csv"
  raw_asset_from_filename: true
  # 最低样本阈值，用于审计表统计
  min_rows_per_asset: 30
  # 最小字段约束（可按需加减）
  fields_required: [date, asset, close]

factor:
  # 占位因子名示例。未替换时会自动忽略并尝试从面板列自动发现因子。
  names: [factor_name]
  # 当因子不存在时：raise / warn_skip
  on_missing: warn_skip
  # names 为空或仅占位名时，是否自动从面板列发现可研究因子
  auto_discover_from_panel: true
  # 插件相关（按需开启）
  auto_discover: false
  plugin_dirs: []
  plugins: []
  plugin_on_error: warn_skip
  # 表达式因子与组合因子（按需配置）
  expressions: {}
  expression_on_error: warn_skip
  combinations: []
  combination_on_error: warn_skip

research:
  horizons: [1, 5, 10, 20]
  quantiles: 5
  ic_rolling_window: 20
  annualization_days: 252
  missing_policy: drop
  preprocess_steps: [winsorize, standardize, neutralize]
  winsorize:
    enabled: true
    method: quantile
    lower_q: 0.01
    upper_q: 0.99
    mad_scale: 5.0
  neutralize:
    enabled: true
    mode: both

backtest:
  enabled: false
  strategy:
    mode: longshort
    long_short_quantile: 0.2
    rebalance_every: 1
    weight_scheme: equal
