run:
  factor_scope: ts
  eval_axis: time
  standardization: ts_rolling_zscore

data:
  mode: single_asset
  adapter: synthetic
  fields_required: [date, close]
  sanitize: true
  duplicate_policy: last
  synthetic:
    n_assets: 1
    n_days: 320
    seed: 2026
    start_date: "2020-01-01"

factor:
  names: [momentum_20, volatility_20]
  on_missing: raise

research:
  horizons: [1, 5, 10, 20]
  quantiles: 5
  ic_rolling_window: 30
  annualization_days: 252
  ts_standardize_window: 60
  ts_quantile_lookback: 80
  ts_signal_lags: [0, 1, 2, 5, 10]
  transform_auto_discover: false
  transform_plugin_dirs: []
  transform_plugins: []
  transform_plugin_on_error: raise
  custom_transforms: []

backtest:
  enabled: true
  strategy:
    mode: sign
    sign_threshold: 0.0
  commission_bps: 2.0
  slippage_bps: 1.0
  leverage: 1.0
  execution_delay_days: 1
  execution_price_col: close
