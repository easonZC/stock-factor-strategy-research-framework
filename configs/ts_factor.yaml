# 时序因子研究配置（单资产 synthetic）
# 目标：验证 TS 因子流程、滞后分析与基础回测。

imports:
  - base.yaml

run:
  factor_scope: ts
  eval_axis: time
  # ts_rolling_zscore / zscore / none
  standardization: ts_rolling_zscore
  research_profile: full

data:
  adapter: synthetic
  mode: single_asset
  fields_required: [date, close]

  synthetic:
    n_assets: 1
    n_days: 420
    seed: 2026
    start_date: "2020-01-01"

factor:
  names: [momentum_20, volatility_20]

research:
  horizons: [1, 5, 10, 20]
  quantiles: 5
  ic_rolling_window: 30

  # TS 专用参数
  ts_standardize_window: 60
  ts_quantile_lookback: 80
  ts_signal_lags: [0, 1, 2, 5, 10]

backtest:
  enabled: true
  strategy:
    mode: sign
    sign_threshold: 0.0
