# 基础配置模板（所有场景共用）
# 说明：
# 1) 业务配置尽量写在子配置中，此文件只保留通用默认值
# 2) 可通过 imports 分层叠加，后加载文件覆盖先加载文件
# 3) 可通过 CLI --set 临时覆盖字段

run:
  # 配置治理：strict / warn / compat
  config_mode: warn
  # 泄露防护：strict / warn / off
  leakage_guard_mode: strict
  # 阶段停止点：factor / research / backtest
  stop_after: backtest
  # 研究档位：fast / dev / full（决定研究默认粒度）
  research_profile: full
  # 自动纠偏后是否直接失败
  fail_on_autocorrect: false

data:
  sanitize: true
  duplicate_policy: last
  # 数据适配器插件
  adapter_auto_discover: false
  adapter_plugin_dirs: []
  adapter_plugins: []
  adapter_plugin_on_error: warn_skip

factor:
  # 因子缺失处理：raise / warn_skip
  on_missing: warn_skip
  # 因子插件
  auto_discover: false
  plugin_dirs: []
  plugins: []
  plugin_on_error: warn_skip
  # 表达式因子
  expressions: {}
  expression_on_error: warn_skip
  # 组合因子
  combinations: []
  combination_on_error: warn_skip

research:
  annualization_days: 252
  # 缺失值策略：drop / fill_zero / ffill_by_asset / cs_median_by_date / keep
  missing_policy: drop
  # 变换插件
  transform_auto_discover: false
  transform_plugin_dirs: []
  transform_plugins: []
  transform_plugin_on_error: warn_skip
  custom_transforms: []
  # CS 相关（TS 会忽略）
  winsorize:
    enabled: true
    method: quantile
    lower_q: 0.01
    upper_q: 0.99
    mad_scale: 5.0
  neutralize:
    enabled: true
    mode: both

backtest:
  enabled: true
  strategy:
    mode: longshort
    rebalance_every: 1
    weight_scheme: equal
    auto_discover: false
    plugin_dirs: []
    plugins: []
    plugin_on_error: warn_skip
  commission_bps: 3.0
  slippage_bps: 2.0
  leverage: 1.0
  execution_delay_days: 1
  execution_price_col: close
  # 风险约束（null 表示不启用）
  max_turnover: null
  max_abs_weight: null
  max_gross_exposure: null
  max_net_exposure: null
  enforce_industry_neutral: false
  industry_col: industry
