name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: |
          ruff check core apps tests

      - name: Unit tests
        run: |
          pytest -q

      - name: Synthetic Report Smoke
        run: |
          python apps/run_factor_research_synthetic.py --out outputs/research/factor/ci_smoke --assets 10 --days 90
          test -f outputs/research/factor/ci_smoke/index.html
          test -f outputs/research/factor/ci_smoke/tables/summary.csv
          test "$(find outputs/research/factor/ci_smoke/assets -name '*.png' | wc -l)" -ge 6
